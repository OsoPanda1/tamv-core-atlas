name: Security Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Secret redaction validation
        run: npm run security:scan -- --validate
      - name: Atlas validation
        run: npm run validate