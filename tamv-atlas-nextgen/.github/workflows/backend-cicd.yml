name: backend-cicd

on:
  push:
    branches: ["main", "work"]
    paths:
      - "backend/**"
      - "infra/k8s/**"
      - ".github/workflows/backend-cicd.yml"
  pull_request:
    paths:
      - "backend/**"
      - "infra/k8s/**"
      - ".github/workflows/backend-cicd.yml"
  workflow_dispatch:

jobs:
  thcf-bookpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run lint:thcf
      - run: bash scripts/build_bookpi.sh ${{ github.sha }}

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package.json
      - run: npm install
      - run: npm test

  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [backend-test, thcf-bookpi]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/tamv-identity-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/tamv-identity-api:latest

  deploy-k8s:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set kubectl context
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
      - name: Render image tag
        run: |
          sed -i "s|tamv-identity-api:latest|tamv-identity-api:${{ github.sha }}|g" infra/k8s/deployment.yaml
      - name: Apply manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/secret.example.yaml
          kubectl apply -f infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/service.yaml
          kubectl apply -f infra/k8s/hpa.yaml
          kubectl apply -f infra/k8s/networkpolicy.yaml
          kubectl apply -f infra/k8s/pdb.yaml
          kubectl apply -f infra/k8s/ingress.yaml
          kubectl apply -f infra/k8s/cronjob-pid-reconcile.yaml
