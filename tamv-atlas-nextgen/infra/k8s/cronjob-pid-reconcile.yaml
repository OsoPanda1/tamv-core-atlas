apiVersion: batch/v1
kind: CronJob
metadata:
  name: tamv-pid-reconcile
  namespace: tamv-prod
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pid-reconciler
              image: ghcr.io/osopanda1/tamv-digital-nexus/tamv-identity-api:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "src/jobs/pidReconcileJob.js"]
              envFrom:
                - configMapRef:
                    name: tamv-identity-config
                - secretRef:
                    name: tamv-identity-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
