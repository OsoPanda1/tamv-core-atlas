apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tamv-identity-api
  namespace: tamv-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tamv-identity-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
